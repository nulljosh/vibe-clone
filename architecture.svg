<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <style>
      .bg { fill: #0f0f0f; }
      .box { fill: #1a1a1a; stroke: #0a84ff; stroke-width: 2; }
      .box-alt { fill: #1a1a1a; stroke: #666; stroke-width: 1.5; }
      .label { fill: #e0e0e0; font-size: 13px; font-weight: 600; text-anchor: middle; }
      .sub { fill: #888; font-size: 11px; text-anchor: middle; }
      .arrow { stroke: #666; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .section-label { fill: #555; font-size: 10px; font-weight: 600; letter-spacing: 0.8px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <rect width="900" height="280" class="bg"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">vibe-clone Pipeline</text>

  <!-- INPUT -->
  <text x="45" y="75" class="section-label">INPUT</text>
  <rect x="20" y="80" width="100" height="60" rx="8" class="box"/>
  <text x="70" y="108" class="label">Website URL</text>
  <text x="70" y="125" class="sub">https://...</text>

  <!-- Arrow 1 -->
  <line x1="122" y1="110" x2="158" y2="110" class="arrow"/>

  <!-- SCRAPER -->
  <text x="160" y="75" class="section-label">SCRAPER</text>
  <rect x="160" y="80" width="120" height="60" rx="8" class="box"/>
  <text x="220" y="108" class="label">Puppeteer</text>
  <text x="220" y="125" class="sub">Extract DOM styles</text>

  <!-- Arrow 2 -->
  <line x1="282" y1="110" x2="318" y2="110" class="arrow"/>

  <!-- ANALYZER -->
  <text x="320" y="75" class="section-label">ANALYZER</text>
  <rect x="320" y="80" width="140" height="140" rx="8" class="box"/>
  <text x="390" y="105" class="label">Color Clustering</text>
  <line x1="330" y1="115" x2="450" y2="115" stroke="#333" stroke-width="1"/>
  <text x="390" y="135" class="sub">Hue buckets (30°)</text>
  <text x="390" y="152" class="sub">Lightness levels (20%)</text>
  <text x="390" y="169" class="sub">Dark mode detect</text>
  <text x="390" y="186" class="sub">Visual grouping</text>
  <text x="390" y="210" class="label">+ Typography</text>
  <text x="390" y="227" class="sub">Fonts, sizes, weights</text>

  <!-- Arrow 3 -->
  <line x1="462" y1="150" x2="498" y2="150" class="arrow"/>

  <!-- FORMATTER -->
  <text x="500" y="75" class="section-label">FORMATTER</text>
  <rect x="500" y="80" width="120" height="140" rx="8" class="box"/>
  <text x="560" y="115" class="label">CSS Variables</text>
  <line x1="510" y1="125" x2="610" y2="125" stroke="#333" stroke-width="1"/>
  <text x="560" y="150" class="label">Tailwind Config</text>
  <line x1="510" y1="160" x2="610" y2="160" stroke="#333" stroke-width="1"/>
  <text x="560" y="185" class="label">JSON</text>
  <text x="560" y="207" class="sub">Palette + typography</text>

  <!-- Arrow 4 -->
  <line x1="622" y1="150" x2="658" y2="150" class="arrow"/>

  <!-- OUTPUT -->
  <text x="660" y="75" class="section-label">OUTPUT</text>
  <rect x="660" y="80" width="100" height="140" rx="8" class="box"/>
  <text x="710" y="120" class="label">Console</text>
  <line x1="670" y1="130" x2="750" y2="130" stroke="#333" stroke-width="1"/>
  <text x="710" y="155" class="label">File</text>
  <line x1="670" y1="165" x2="750" y2="165" stroke="#333" stroke-width="1"/>
  <text x="710" y="190" class="label">JSON API</text>

  <!-- Legend -->
  <text x="45" y="260" fill="#555" font-size="10">Input URL →</text>
  <text x="150" y="260" fill="#0a84ff" font-size="10" font-weight="600">Scrape</text>
  <text x="220" y="260" fill="#555" font-size="10">→ Analyze &amp; cluster →</text>
  <text x="485" y="260" fill="#0a84ff" font-size="10" font-weight="600">Format</text>
  <text x="565" y="260" fill="#555" font-size="10">→ Export</text>
</svg>
